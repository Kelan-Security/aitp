[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
source = ["kelan"]
omit = [
  "kelan/tests/*",
  "kelan/server.py",
  "kelan/enforcement/ebpf_bridge.py",   # eBPF is hardware-specific
  "kelan/api/websocket/*",
  "**/__init__.py"
]

[tool.coverage.report]
fail_under = 60
show_missing = true
skip_covered = true
