version: '3.8'
# Kelan Security — Monitoring stack overlay
#
# Usage (combines with the production stack):
#   docker compose \
#     --env-file .env.prod \
#     -f docker-compose.prod.yml \
#     -f docker-compose.monitoring.yml \
#     up -d
#
# Access:
#   Grafana:    http://localhost:3001   (admin / $GRAFANA_PASSWORD)
#   Prometheus: http://localhost:9090   (internal use)

services:

  prometheus:
    image: prom/prometheus:v2.47.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'    # allows hot-reload via POST /-/reload
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - kelan_internal
      - monitoring
    ports:
      - "127.0.0.1:9090:9090"   # bound to loopback only — access via Grafana
    depends_on:
      - kelan-server
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:       admin
      GF_SECURITY_ADMIN_PASSWORD:   "${GRAFANA_PASSWORD:-kelan_grafana_admin}"
      GF_USERS_ALLOW_SIGN_UP:       "false"
      GF_SERVER_ROOT_URL:           "https://metrics.kelan.io"
      GF_AUTH_ANONYMOUS_ENABLED:    "false"
      GF_SMTP_ENABLED:              "true"
      GF_SMTP_HOST:                 "smtp.gmail.com:587"
      GF_SMTP_USER:                 "${ALERT_EMAIL:-}"
      GF_SMTP_PASSWORD:             "${ALERT_EMAIL_PASSWORD:-}"
      GF_UNIFIED_ALERTING_ENABLED:  "true"
      GF_ALERTING_ENABLED:          "false"  # legacy alerting off
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
      - kelan_web
    ports:
      - "3001:3000"   # Grafana on 3001; Kelan server uses 3000
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.26.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - monitoring
    environment:
      ALERT_EMAIL:          "${ALERT_EMAIL:-}"
      ALERT_EMAIL_PASSWORD: "${ALERT_EMAIL_PASSWORD:-}"
      SLACK_WEBHOOK_URL:    "${SLACK_WEBHOOK_URL:-}"

  # system metrics — CPU, memory, disk, network (Linux only; remove on macOS dev)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring
    pid: host   # needs host PID namespace for process stats (Linux only)

  # postgres metrics — connection pool, query stats, replication
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://kelan:${POSTGRES_PASSWORD}@postgres:5432/kelan?sslmode=disable"
    networks:
      - kelan_internal
      - monitoring
    depends_on:
      - postgres

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  monitoring:
    internal: true   # monitoring network is internal — no direct internet access
  kelan_internal:
    external: true   # created by docker-compose.prod.yml
  kelan_web:
    external: true   # created by docker-compose.prod.yml
