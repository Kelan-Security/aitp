global:
  scrape_interval:     15s   # scrape every 15 seconds
  evaluation_interval: 15s   # evaluate alerting rules every 15 seconds
  scrape_timeout:      10s

  # Labels added to all time series from this instance
  external_labels:
    cluster:     kelan-prod
    environment: production

# ── Alert rules ──────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts/*.yml

# ── Alertmanager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ── Scrape targets ───────────────────────────────────────────────────────────
scrape_configs:
  # Kelan Intelligence Core
  - job_name: kelan_server
    static_configs:
      - targets: ['kelan-server:3000']
    metrics_path: /metrics
    scrape_interval: 10s   # more frequent for security metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   kelan-intelligence-core

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (system metrics — CPU, memory, disk)
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # Postgres exporter (DB metrics)
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
