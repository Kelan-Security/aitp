global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    cluster:     kelan-prod
    environment: production

# ── Alert rules ───────────────────────────────────────────────────────────────
# Docker path:  /etc/prometheus/alerts/*.yml
# Local dev path: ./monitoring/alerts/*.yml
rule_files:
  - /etc/prometheus/alerts/*.yml
  - alerts/*.yml

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:
  # Kelan Intelligence Core — Docker network
  - job_name: kelan_server
    static_configs:
      - targets: ['kelan-server:3000']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   kelan-intelligence-core

  # Kelan Intelligence Core — native Rust (./start.sh / make dev)
  - job_name: kelan_server_local
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   kelan-local

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (system metrics — optional, see docker-compose.monitoring.yml)
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # Postgres exporter (optional, see docker-compose.monitoring.yml)
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
