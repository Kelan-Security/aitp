groups:
  - name: kelan_security_alerts
    interval: 30s
    rules:

      # ── CRITICAL: Trust Engine Failures ───────────────────────────────────
      - alert: TrustEngineErrorRate
        expr: |
          rate(kelan_gemini_errors_total[5m]) /
          rate(kelan_sessions_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Trust engine error rate above 5%"
          description: |
            Gemini API error rate is {{ $value | humanizePercentage }} over last 5 minutes.
            Sessions are falling back to rules-only evaluation.
            Check GEMINI_API_KEY and Gemini API status.

      # ── CRITICAL: DDoS Indicator ──────────────────────────────────────────
      - alert: DDoSFloodDetected
        expr: |
          rate(kelan_ebpf_packets_total{action="drop"}[1m]) >
          rate(kelan_ebpf_packets_total{action="drop"}[10m] offset 10m) * 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Possible DDoS — XDP drop rate spiked 10x"
          description: |
            XDP drop rate: {{ $value | humanize }} packets/sec.
            Possible DDoS attack in progress. Check source IPs.

      # ── CRITICAL: Session Denial Spike ────────────────────────────────────
      - alert: SessionDenyRateHigh
        expr: |
          rate(kelan_sessions_total{verdict="Deny"}[5m]) /
          rate(kelan_sessions_total[5m]) > 0.30
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "30%+ sessions being denied — attack in progress?"
          description: |
            Session deny rate: {{ $value | humanizePercentage }}.
            This may indicate coordinated attack attempts.
            Check anomaly dashboard for details.

      # ── WARNING: Gemini Latency Degraded ──────────────────────────────────
      - alert: GeminiLatencyDegraded
        expr: |
          histogram_quantile(0.99,
            rate(kelan_gemini_latency_ms_bucket[5m])
          ) > 8000
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Gemini P99 latency above 8 seconds"
          description: |
            Gemini 2.5 P99 latency: {{ $value | humanize }}ms.
            Trust evaluations are degrading. Sessions may timeout to rules-only.
            Consider switching to a faster AI provider temporarily.

      # ── WARNING: Entity Quarantined ───────────────────────────────────────
      - alert: EntityQuarantined
        expr: increase(kelan_anomalies_total{severity="critical"}[5m]) > 0
        for: 0m   # fire immediately
        labels:
          severity: warning
        annotations:
          summary: "Critical anomaly detected — entity may be quarantined"
          description: |
            {{ $value }} critical anomalies in last 5 minutes.
            Check the Kelan Security dashboard for incident details.

      # ── WARNING: License Near Limit ───────────────────────────────────────
      - alert: LicenseNearLimit
        expr: kelan_license_utilisation > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "License node limit above 85%"
          description: |
            Org {{ $labels.org_id }} ({{ $labels.tier }} tier) is at
            {{ $value | humanizePercentage }} of node limit.
            Upgrade to avoid registration failures.

      # ── INFO: Trust Cache Miss Rate High ──────────────────────────────────
      - alert: TrustCacheMissRateHigh
        expr: |
          rate(kelan_trust_cache_total{result="miss"}[10m]) /
          rate(kelan_trust_cache_total[10m]) > 0.50
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Trust cache miss rate above 50%"
          description: |
            Cache miss rate: {{ $value | humanizePercentage }}.
            Consider increasing cache TTL or capacity.
            High miss rate increases Gemini API costs.

      # ── INFO: Sentinel Channel Backing Up ────────────────────────────────
      - alert: SentinelChannelDepthHigh
        expr: kelan_sentinel_channel_depth > 5000
        for: 2m
        labels:
          severity: info
        annotations:
          summary: "Sentinel event channel backing up"
          description: |
            {{ $value }} events pending in Sentinel channel (capacity: 10000).
            Sentinel may be falling behind under high load.
