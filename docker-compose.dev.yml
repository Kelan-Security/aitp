version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kernex
      POSTGRES_PASSWORD: kernex_dev
      POSTGRES_DB: kernex
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kernex"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
