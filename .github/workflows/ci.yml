name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ──────────────────────────────────────────────────────────────────────────────
# Job 1: Test
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --no-fail-fast
        env:
          DATABASE_URL: "sqlite::memory:"
          JWT_SECRET: "ci_test_secret_key_32chars_minimum"
          RUST_LOG: "debug"
          AITP_AI_ENGINE_GEMINI_API_KEY: "test_key_no_real_calls"

      - name: Cargo audit (advisory only — non-blocking)
        run: |
          cargo install cargo-audit --quiet 2>/dev/null || true
          cargo audit --deny unsound || echo "::warning::cargo audit found advisories — review before release"

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2: Build and push Docker image to GHCR
  # ──────────────────────────────────────────────────────────────────────────────
  build-docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Oracle Cloud demo instance
  # Only runs on main branch after Docker build succeeds
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-demo:
    name: 🚀 Deploy to Demo
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: demo
      url: http://${{ secrets.ORACLE_DEMO_IP }}:3000

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_DEMO_IP }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            set -e
            echo "=== Kelan Demo Deployment ==="
            echo "Commit: ${{ github.sha }}"

            # Pull latest image
            docker pull ghcr.io/${{ github.repository }}:latest

            # Rolling restart (zero-downtime)
            cd /opt/kelan
            docker compose pull
            docker compose up -d --remove-orphans

            # Wait for health
            echo "Waiting for server to be healthy..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                break
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
            done

            # Final verification
            curl -sf http://localhost:3000/health | jq .
            echo "=== Deployment complete ==="

      - name: Notify deployment success
        if: success()
        run: |
          echo "### ✅ Demo Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** http://${{ secrets.ORACLE_DEMO_IP }}:3000" >> $GITHUB_STEP_SUMMARY
          echo "- **Grafana:** http://${{ secrets.ORACLE_DEMO_IP }}:3003" >> $GITHUB_STEP_SUMMARY

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_DEMO_IP }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          script: |
            echo "Deployment failed — rolling back..."
            cd /opt/kelan
            docker compose up -d --no-build
            echo "Rollback complete"
