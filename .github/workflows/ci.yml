name: Kelan Security CI

on:
  push:
    branches: [main, Kelan-linux, ollama-integration]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────
  # JOB 1: BUILD & CHECK
  # ─────────────────────────────────────────
  build:
    name: Build & Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install eBPF build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang llvm libelf-dev zlib1g-dev \
            linux-headers-$(uname -r) libbpf-dev bpftool

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo build (release)
        run: cargo build --release --workspace
        env:
          KELAN_MODE: software  # No eBPF in CI runner
          DB_URL: sqlite:./data/kelan.db
          OLLAMA_MODEL: gemma:2b

      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings

  # ─────────────────────────────────────────
  # JOB 2: TESTS
  # ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-22.04
    needs: build
    services:
      # Stub Ollama with mock server for tests
      ollama-mock:
        image: mockserver/mockserver:latest
        ports:
          - 11434:1080
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang llvm libelf-dev zlib1g-dev libbpf-dev

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Create data dir
        run: mkdir -p data

      - name: Setup mock Ollama responses
        run: |
          curl -X PUT http://localhost:11434/mockserver/expectation \
            -H "Content-Type: application/json" \
            -d '{
              "httpRequest": {"path": "/api/generate"},
              "httpResponse": {
                "statusCode": 200,
                "body": "{\"response\":\"{\\\"verdict\\\":\\\"ALLOW\\\",\\\"confidence\\\":0.9,\\\"reason\\\":\\\"test\\\"}\",\"done\":true}"
              }
            }' || echo "Mock setup skipped (MockServer not ready)"

      - name: Run unit tests
        run: cargo test --workspace --lib
        env:
          OLLAMA_ENDPOINT: http://localhost:11434
          OLLAMA_MODEL: gemma:2b
          DB_URL: sqlite:./data/kelan.db
          KELAN_JWT_SECRET: test-secret-for-ci
          KELAN_MODE: software
          RUST_LOG: warn

      - name: Run integration tests
        run: cargo test --workspace --test '*'
        env:
          OLLAMA_ENDPOINT: http://localhost:11434
          OLLAMA_MODEL: gemma:2b
          DB_URL: sqlite:./data/kelan.db
          KELAN_JWT_SECRET: test-secret-for-ci
          KELAN_MODE: software
          RUST_LOG: warn
        continue-on-error: true  # Integration tests are best-effort in CI

  # ─────────────────────────────────────────
  # JOB 3: SECURITY SCAN
  # ─────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Cargo audit
        run: cargo audit
        continue-on-error: true  # Warn on known transitive issues

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Dependency license check
        run: cargo deny check licenses
        continue-on-error: true

      - name: Check for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 4: DOCKER BUILD
  # ─────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-22.04
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (main branch only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/kelan-security:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/kelan-security:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 5: RELEASE (on tags only)
  # ─────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test, security, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p aitp-server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/aitp-server
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
