name: Security

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run security scan daily at midnight
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  trufflehog:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required
      
      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          # Remove --fail as the action includes it natively.
          # --only-verified ensures we only fail on active, verified credentials.
          extra_args: --only-verified

  cargo-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-audit-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      
      - name: Run audit
        run: |
          echo "::group::Security Audit Results"
          # Run audit and output to json, ignoring exit code temporarily
          cargo audit --json > audit.json || true
          
          # Print the normal human-readable output to logs
          cargo audit || true
          
          # Use jq to check for critical vulnerabilities
          CRITICAL=$(jq '[.vulnerabilities.list[] | select(.advisory.cvss_base_score >= 7.0)] | length' audit.json)
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL HIGH/CRITICAL vulnerabilities!"
            exit 1
          fi
          
          echo "::endgroup::"
