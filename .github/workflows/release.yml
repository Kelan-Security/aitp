name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Set to true and add login steps for production
          tags: |
            tanushjain/aitp:latest
            tanushjain/aitp:${{ github.ref_name }}
