# Kelan Security — Production-ready stack
# Note: uses local build for the server for zero-config deployment.

services:
  kelan-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: kelan-server:local
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kelan:${POSTGRES_PASSWORD}@postgres:5432/kelan
      AITP_JWT_SECRET: ${AITP_JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AITP_TRUST_MODE: hybrid
      AITP_SENTINEL_ENABLED: "true"
      AITP_AUTO_QUARANTINE: "true"
      RUST_LOG: aitp_server=info
    volumes:
      - kelan_data:/app/data
      - kelan_keys:/app/keys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kelan_internal
      - kelan_web

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kelan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kelan
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - kelan_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelan"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/kelan.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - kelan-server
    networks:
      - kelan_web

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  kelan_data:
  kelan_keys:
  pg_data:
  certbot_www:
  certbot_conf:

networks:
  kelan_internal:
    internal: true
  kelan_web:
