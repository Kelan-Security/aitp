global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'aitp-control-plane'
    static_configs:
      - targets: ['aitp-control-plane:8080']

  - job_name: 'aitp-node-a'
    static_configs:
      - targets: ['aitp-node-a:9999']

  - job_name: 'aitp-node-b'
    static_configs:
      - targets: ['aitp-node-b:9998']
